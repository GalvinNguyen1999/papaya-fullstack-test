# Render Blueprint — Postgres + backend (NestJS). Deploy the frontend on Vercel.
databases:
  - name: papaya-db
    plan: free

services:
  - type: web
    name: papaya-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: papaya-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*" # tighten to your Vercel URL after first deploy
      - key: OPENAI_API_KEY # optional — leave unset to use Jina/template
        sync: false
      - key: JINA_API_KEY # optional — free key from jina.ai
        sync: false
