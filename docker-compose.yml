# Local Postgres for development. `docker compose up -d` then run migrations.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: papaya
      POSTGRES_PASSWORD: papaya
      POSTGRES_DB: papaya
    ports:
      - "5432:5432"
    volumes:
      - papaya_pgdata:/var/lib/postgresql/data

volumes:
  papaya_pgdata:
